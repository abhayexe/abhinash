<!DOCTYPE html>
<html>
  <head>
    <title>Simple Gemini Test</title>
  </head>
  <body>
    <h1>Test Gemini 2.0 Flash Exp</h1>
    <button onclick="testAPI()">Test API (with delay)</button>
    <div id="result"></div>

    <script>
      async function testAPI() {
        const result = document.getElementById("result");
        result.innerHTML = "Testing...";

        // Wait a bit to avoid rate limiting
        await new Promise((resolve) => setTimeout(resolve, 2000));

        try {
          const response = await fetch(
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash-exp:generateContent?key=AIzaSyBn-CHbkORD3gFb8uA1m30VTNVnnLYlrNw",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                contents: [{ parts: [{ text: "Hello, test message" }] }],
              }),
            }
          );

          if (response.ok) {
            const data = await response.json();
            result.innerHTML = "✅ Success! " + JSON.stringify(data, null, 2);
          } else {
            result.innerHTML =
              "❌ Error: " + response.status + " " + response.statusText;
          }
        } catch (error) {
          result.innerHTML = "❌ Error: " + error.message;
        }
      }
    </script>
  </body>
</html>
