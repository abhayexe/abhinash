<!DOCTYPE html>
<html>
  <head>
    <title>Final ChatBot Test</title>
  </head>
  <body>
    <h1>🤖 Final ChatBot API Test</h1>
    <button onclick="testChatBot()">Test ChatBot API</button>
    <div id="result"></div>

    <script>
      async function testChatBot() {
        const result = document.getElementById("result");
        result.innerHTML = "Testing gemini-2.5-flash...";

        try {
          const response = await fetch(
            "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=AIzaSyBn-CHbkORD3gFb8uA1m30VTNVnnLYlrNw",
            {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                contents: [
                  {
                    role: "user",
                    parts: [
                      {
                        text: "Hello! Can you help me with car maintenance tips?",
                      },
                    ],
                  },
                ],
                generationConfig: {
                  temperature: 0.2,
                  topK: 40,
                  topP: 0.95,
                  maxOutputTokens: 1024,
                },
              }),
            }
          );

          if (response.ok) {
            const data = await response.json();
            const aiResponse =
              data.candidates?.[0]?.content?.parts?.[0]?.text || "No response";
            result.innerHTML = `
                        <div style="background: #d4edda; color: #155724; padding: 10px; border-radius: 5px;">
                            ✅ ChatBot API Working!<br>
                            <strong>Response:</strong> ${aiResponse}
                        </div>
                    `;
          } else {
            result.innerHTML = `
                        <div style="background: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px;">
                            ❌ Error: ${response.status} ${response.statusText}
                        </div>
                    `;
          }
        } catch (error) {
          result.innerHTML = `
                    <div style="background: #f8d7da; color: #721c24; padding: 10px; border-radius: 5px;">
                        ❌ Error: ${error.message}
                    </div>
                `;
        }
      }
    </script>
  </body>
</html>
